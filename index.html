<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <script src="js/login.js" defer></script>
</head>
<body>
    <div id="login-container">
        <div id="login-panel" class="std-box-shadow">
            <h1>Login</h1>
            <form id="login-form">
                <input type="password" id="pwd" placeholder="Password">
                <button type="button" id="login-btn">Einloggen</button>
            </form>
            <p id="login-result"></p>
        </div>
    </div>
</body>
</html>
